name: machine-path-check

# Separate from pr-text-check.yml: that scans the PR title/body prose for internal plan markers; this scans the
# branch CODE diff for concrete local-machine absolute paths. The pre-commit hook is the local gate; this
# merge-blocking job is the remote backstop (the hook is --no-verify-bypassable and clone-hooks-optional).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  machine-path-leakage:
    name: No concrete local-machine absolute paths in the branch diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - shell: pwsh
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: ./scripts/check-no-machine-paths.ps1 -BaseRef "$env:BASE_REF"

  machine-path-tests:
    name: machine-path checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-no-machine-paths.tests.ps1
