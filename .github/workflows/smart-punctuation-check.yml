name: smart-punctuation-check

# Enforce the AGENTS.md 3.14 ban on smart punctuation (em/en-dash, horizontal bar, curly single/double quotes, ellipsis) in repo text.
# An exception allowlist (.github/pr-quality-gate/data/smart-punctuation-allowlist.txt) lists any files
# permitted to retain a banned char; it is normally empty (the ban is enforced repo-wide). No paths
# filter: a banned character can appear in any tracked text file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smart-punctuation-check:
    name: No banned smart punctuation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check for banned smart punctuation outside the allowlist
        shell: pwsh
        run: ./scripts/check-no-smart-punctuation.ps1
      - name: Run check-no-smart-punctuation unit tests
        shell: pwsh
        run: ./scripts/tests/check-no-smart-punctuation.tests.ps1
