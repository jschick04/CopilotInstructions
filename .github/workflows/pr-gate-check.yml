name: pr-gate-check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playbook-ref-check:
    name: Verify playbook path references resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-playbook-refs.ps1

  playbook-ref-tests:
    name: playbook-refs checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-playbook-refs.tests.ps1

  instructions-ref-check:
    name: Verify instruction-file references resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-instructions-refs.ps1

  instructions-ref-tests:
    name: instructions-refs checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-instructions-refs.tests.ps1

  catalog-cede-ref-check:
    name: Verify catalog cede references resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-catalog-cede-refs.ps1

  catalog-cede-ref-tests:
    name: catalog-cede-refs checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-catalog-cede-refs.tests.ps1

  catalog-fp-ref-check:
    name: Verify catalog fp_slug references resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-catalog-fp-refs.ps1

  catalog-fp-ref-tests:
    name: catalog-fp-refs checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-catalog-fp-refs.tests.ps1

  script-tests:
    name: comment-audit module unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-comment-audit.tests.ps1

  panel-ledger-tests:
    name: panel-ledger module unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-post-code-change.tests.ps1

  hygiene-signals-tests:
    name: hygiene-signals (B1) unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/hygiene-signals.tests.ps1

  quotepath-convention-tests:
    name: quotePath-convention guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/quotepath-convention.tests.ps1

  read-receipts-tests:
    name: read-receipt gate unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-read-receipts.tests.ps1

  diff-consistency:
    name: Deterministic diff-consistency checker (D2, every PR commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - shell: pwsh
        run: ./scripts/check-diff-consistency-ci.ps1 -BaseRef "origin/${{ github.base_ref }}" -FetchBranch "${{ github.base_ref }}" -CiMode

  diff-consistency-tests:
    name: diff-consistency checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-diff-consistency.tests.ps1

  checker-registry-parity:
    name: Deterministic checker-registry parity (fail-loud on unwired hard-fail slug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-checker-registry.ps1

  commit-message:
    name: Deterministic commit-message format gate (every PR commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - shell: pwsh
        run: ./scripts/check-commit-message.ps1 -BaseRef "origin/${{ github.base_ref }}" -FetchBranch "${{ github.base_ref }}" -CiMode

  commit-message-tests:
    name: commit-message checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-commit-message.tests.ps1

  repo-root-tests:
    name: repo-root resolver unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/repo-root.tests.ps1

  audit-note-helpers-tests:
    name: audit-note helpers unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/audit-note-helpers.tests.ps1

  audit-notes-prepush-tests:
    name: audit-notes prepush checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-audit-notes-prepush.tests.ps1

  structural-conformance-tests:
    name: structural-conformance checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-structural-conformance.tests.ps1

  signoff-tests:
    name: signoff checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-signoff.tests.ps1

  publish-gate-prepush-tests:
    name: publish-gate prepush checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-publish-gate-prepush.tests.ps1

  duplication-tests:
    name: duplication checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-duplication.tests.ps1

  local-ci-coverage:
    name: Local-CI mirror coverage (every workflow check is a mirrored script)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/run-local-ci.ps1 -CoverageOnly

  local-ci-harness-tests:
    name: Local-CI harness unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/run-local-ci.tests.ps1

  lint:
    name: PowerShell lint (PSScriptAnalyzer, repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-lint.ps1

  lint-tests:
    name: lint checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-lint.tests.ps1

  panel-artifact-scan:
    name: No review-process artifacts in code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/check-no-panel-artifacts.ps1

  panel-artifact-tests:
    name: panel-artifact checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-no-panel-artifacts.tests.ps1

  panel-misses-enum-sync-tests:
    name: panel-misses classification enum sync tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/panel-misses-classification-sync.tests.ps1

  yaml-emit-helper-tests:
    name: yaml-emit helper + pwsh-bash parity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/yaml-emit-helpers.tests.ps1
