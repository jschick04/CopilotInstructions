name: catalog-sync-check

# Drift safeguard backstop. Runs on every push and PR to enforce that
# HIGH-TIER-SLUGS.md stays in sync with pattern-catalog.md AND that the
# pwsh + bash sync-critical-rules implementations produce byte-identical output.
#
# Primary defense is .githooks/pre-commit; this workflow catches:
#   1. `git commit --no-verify` bypasses of the local hook
#   2. Contributors who never ran setup.ps1 / setup.sh to wire core.hooksPath
#   3. Drift between the pwsh and bash sync-critical-rules implementations
#
# See .github/pr-quality-gate/panel-policy.md §"Catalog-edit + ack-sync invariant"
# for the full design.

on:
  push:
    branches: [main]
  pull_request:
    # Note: NOT pull_request_target — fork-safety. The verify job is
    # cheap + read-only so running on the untrusted PR head is safe.
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify HIGH-TIER-SLUGS.md is in sync (pwsh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run sync -Verify (pwsh)
        shell: pwsh
        run: |
          ./scripts/sync-critical-rules.ps1 -Verify

  parity:
    name: Verify pwsh sync == bash sync (byte-identical output)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Generate via pwsh
        shell: pwsh
        run: |
          ./scripts/sync-critical-rules.ps1 -OutputPath /tmp/sync.pwsh.md
      - name: Generate via bash
        run: |
          bash ./scripts/sync-critical-rules.sh -OutputPath /tmp/sync.bash.md
      - name: Compare outputs byte-by-byte
        run: |
          if ! cmp -s /tmp/sync.pwsh.md /tmp/sync.bash.md; then
            echo "ERROR: pwsh and bash sync implementations produce different output." >&2
            echo "--- pwsh hash ---"
            git hash-object /tmp/sync.pwsh.md
            echo "--- bash hash ---"
            git hash-object /tmp/sync.bash.md
            echo "--- diff (truncated) ---"
            diff -u /tmp/sync.pwsh.md /tmp/sync.bash.md | head -40
            exit 1
          fi
          echo "OK: pwsh and bash sync outputs are byte-identical."
