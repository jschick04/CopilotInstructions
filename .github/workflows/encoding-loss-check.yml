name: encoding-loss-check

# Separate per-checker workflow (like machine-path-check.yml): scans the branch CODE diff for the lossy
# ascii re-encode signature (a non-ASCII line reappears with its characters mapped to '?', e.g. from
# Set-Content -Encoding ascii). The pre-commit hook is the local gate; this merge-blocking job is the
# remote backstop (the hook is --no-verify-bypassable and clone-hooks-optional).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  encoding-loss:
    name: No lossy ascii re-encode in the branch diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - shell: pwsh
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: ./scripts/check-encoding-loss.ps1 -BaseRef "$env:BASE_REF"

  encoding-loss-tests:
    name: encoding-loss checker unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - shell: pwsh
        run: ./scripts/tests/check-encoding-loss.tests.ps1
