name: profile-invariants-check

# Enforce the profile-overlay invariants: exactly one always-loaded core, valid profile
# templates, the per-machine active file stays gitignored + uncommitted, and the two
# install scripts agree on the profile flag.

on:
  push:
    branches: [main]
    paths:
      - 'profiles/**'
      - '.gitignore'
      - 'setup.ps1'
      - 'setup.sh'
      - '.github/instructions/**'
      - '.github/workflows/profile-invariants-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'profiles/**'
      - '.gitignore'
      - 'setup.ps1'
      - 'setup.sh'
      - '.github/instructions/**'
      - '.github/workflows/profile-invariants-check.yml'

permissions:
  contents: read

jobs:
  profile-invariants:
    name: Profile overlay invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check invariants
        shell: pwsh
        run: ./scripts/check-profile-invariants.ps1
