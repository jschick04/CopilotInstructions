name: instructions-size-check

# Enforce file-size budgets on always-loaded and on-demand instruction files.
# AGENTS.md (always-loaded core) must stay <= 28KB.
# All other .github/**/*.md files must stay <= 30KB, EXCEPT files on the
# known-oversized allowlist (to be split in P3).

on:
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - '.github/**/*.md'
      - 'profiles/**/*.md'
  pull_request:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - '.github/**/*.md'
      - 'profiles/**/*.md'

permissions:
  contents: read

jobs:
  size-check:
    name: Instruction file size limits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check markdown size budgets
        shell: pwsh
        run: ./scripts/check-md-size.ps1
